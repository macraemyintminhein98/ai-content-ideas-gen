<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Idea Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">🌟 Content AIdeas</h1>
        <p class="text-center text-gray-600 mb-6">Unlock fresh content ideas instantly!</p>

        <div class="mb-4">
            <label for="nicheInput" class="block text-sm font-medium text-gray-700 mb-2">Enter your niche/keyword:</label>
            <input type="text" id="nicheInput" placeholder="e.g., sustainable gardening, indie games, dog training" class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <button id="generateButton" class="w-full bg-blue-600 text-white p-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200">
            Generate Ideas
        </button>

        <div id="loadingSpinner" class="hidden text-center mt-6">
            <svg class="animate-spin h-8 w-8 text-blue-600 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-gray-500 mt-2">Generating ideas...</p>
        </div>

        <div id="ideasOutput" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded-md hidden">
            <h3 class="text-xl font-semibold text-gray-800 mb-3">Your Content Ideas:</h3>
            <ul class="list-disc list-inside space-y-2 text-gray-700" id="ideasList"></ul>
        </div>

        <div id="errorPanel" class="mt-6 p-4 bg-red-100 border border-red-300 text-red-700 rounded-md hidden">
            <p id="errorMessage"></p>
        </div>

        <p class="text-center text-sm text-gray-500 mt-6">Powered by AI</p>
    </div>

    <script>
        document.getElementById('generateButton').addEventListener('click', async () => {
            const niche = document.getElementById('nicheInput').value.trim();
            const ideasOutput = document.getElementById('ideasOutput');
            const ideasList = document.getElementById('ideasList');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const errorPanel = document.getElementById('errorPanel');
            const errorMessage = document.getElementById('errorMessage');

            ideasOutput.classList.add('hidden');
            errorPanel.classList.add('hidden');
            ideasList.innerHTML = '';

            if (!niche) {
                errorPanel.classList.remove('hidden');
                errorMessage.textContent = 'Please enter a niche or keyword!';
                return;
            }

            loadingSpinner.classList.remove('hidden');

            try {
                // Placeholder for Stripe payment and API call integration
                // In a real app, this button click would trigger Stripe Checkout
                // On successful payment, then call your backend API route
                // For demo purposes, we'll simulate an API response locally

                await new Promise(resolve => setTimeout(resolve, 2000)); // Simulate API delay

                const dummyIdeas = [
                    `10 Essential Tools for ${niche} Beginners`,
                    `The Ultimate Guide to Mastering ${niche}`,
                    `Case Study: How ${niche} Improved My Life`,
                    `5 Common Mistakes to Avoid in ${niche}`,
                    `Interview with a ${niche} Expert: Tips and Tricks`
                ];

                dummyIdeas.forEach(idea => {
                    const li = document.createElement('li');
                    li.textContent = idea;
                    ideasList.appendChild(li);
                });
                ideasOutput.classList.remove('hidden');

            } catch (error) {
                console.error('Error generating ideas:', error);
                errorPanel.classList.remove('hidden');
                errorMessage.textContent = 'Failed to generate ideas. Please try again later.';
            } finally {
                loadingSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
